services:
  - type: web
    name: tallyup
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    healthCheckPath: /_stcore/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: STAFF_USERNAME
        sync: false
      - key: STAFF_PASSWORD
        sync: false
      - key: STAFF02_USERNAME
        sync: false
      - key: STAFF02_PASSWORD
        sync: false
